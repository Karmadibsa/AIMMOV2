name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          GEMINI_API_KEY:  "test-gemini-key-ci"
          SUPABASE_URL:    "https://placeholder.supabase.co"
          SUPABASE_KEY:    "placeholder-key"
          CHROMA_PATH:     "/tmp/chroma_ci"
        run: pytest tests/ -v --tb=short --ignore=tests/test_vision.py

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F --ignore E501
